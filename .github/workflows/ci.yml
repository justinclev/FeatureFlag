name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Go dependencies
        working-directory: ./feature-api
        run: go mod download

      - name: Run Go unit tests with coverage
        working-directory: ./feature-api
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Check Go coverage >= 80%
        working-directory: ./feature-api
        run: |
          go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}' | awk '{if ($1 < 80) {print "Coverage is below 80%: "$1"%"; exit 1}}'

      - name: Lint Go code
        working-directory: ./feature-api
        run: |
          go install golang.org/x/lint/golint@latest
          golint ./...

      - name: Build Go API
        working-directory: ./feature-api
        run: go build ./...

      - name: Install dashboard dependencies
        working-directory: ./dashboard
        run: npm ci

      - name: Lint dashboard
        working-directory: ./dashboard
        run: npm run lint

      - name: Build dashboard
        working-directory: ./dashboard
        run: npm run build --if-present
