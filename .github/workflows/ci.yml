name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-go:
    name: Lint API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: feature-api/go.sum
        env:
          GOTOOLCHAIN: local
      - name: Lint Go code
        working-directory: ./feature-api
        run: |
          go install golang.org/x/lint/golint@latest
          $(go env GOPATH)/bin/golint ./...

  test-go:
    name: Test API
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: feature-api/go.sum
        env:
          GOTOOLCHAIN: local
      - name: Install Go dependencies
        working-directory: ./feature-api
        run: go mod download
      - name: Run Go unit tests with coverage
        working-directory: ./feature-api
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out
      - name: Check Go coverage >= 80%
        working-directory: ./feature-api
        run: |
          go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}' | awk '{if ($1 < 80) {print "Coverage is below 80%: "$1"%"; exit 1}}'

  build-go:
    name: Build API
    runs-on: ubuntu-latest
    needs: [lint-go, test-go]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: feature-api/go.sum
        env:
          GOTOOLCHAIN: local
      - name: Build Go API
        working-directory: ./feature-api
        run: go build ./...

  lint-dashboard:
    name: Lint Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dashboard dependencies
        working-directory: ./dashboard
        run: npm ci
      - name: Lint dashboard
        working-directory: ./dashboard
        run: npm run lint

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    needs: [lint-dashboard]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dashboard dependencies
        working-directory: ./dashboard
        run: npm ci
      - name: Build dashboard
        working-directory: ./dashboard
        run: npm run build --if-present
