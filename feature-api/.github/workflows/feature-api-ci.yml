name: Feature API CI

on:
  push:
    branches: [main]
    paths:
      - "feature-api/**"
      - ".github/workflows/feature-api-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "feature-api/**"

defaults:
  run:
    working-directory: feature-api

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: feature-api/go.sum

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=0 go build -v ./...

      - name: Test
        run: go test -v -race ./...
