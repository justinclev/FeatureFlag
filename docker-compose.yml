version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  feature-api:
    build:
      context: ./feature-api
      dockerfile: Dockerfile
    container_name: feature-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - "MONGO_URI=mongodb://mongo:27017/?maxPoolSize=1000&minPoolSize=100"
      - "MONGO_COLLECTION_NAME=flags"
      - "REDIS_ADDR=redis:6379"
      - "REDIS_CACHE_PREFIX=flags:id:"
      - "API_KEY=test-api-key"
      - "GOMEMLIMIT=2GiB"
      - "GOMAXPROCS=4"
      - "LOG_LEVEL=error"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    restart: unless-stopped
    ports:
      - "4200:8080"
    depends_on:
      - feature-api
    networks:
      - app-net

volumes:
  mongo-data:
  redis-data:

networks:
  app-net:
    driver: bridge
