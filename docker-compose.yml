version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  dashboard-api:
    build:
      context: ./dashboard-api
      dockerfile: Dockerfile
    container_name: dashboard-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: "mongodb://mongo:27017"
      FEATURE_API_URL: "http://feature-api:8080"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  feature-api:
    build:
      context: ./feature-api
      dockerfile: Dockerfile
    container_name: feature-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      MONGO_URI: "mongodb://mongo:27017"
      REDIS_ADDR: "redis:6379"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    restart: unless-stopped
    ports:
      - "4200:8080"
    depends_on:
      - dashboard-api
      - feature-api
    networks:
      - app-net

volumes:
  mongo-data:
  redis-data:

networks:
  app-net:
    driver: bridge
